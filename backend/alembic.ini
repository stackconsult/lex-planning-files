# Alembic Configuration for LexCore + LexRadar
# Unified Build System v2 - P1 Core Build - schema-01

[alembic]
# Path to migration scripts (relative to this .ini file)
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Syslog path
# sys_log_path = /path/to/alembic.log

# Encoding used by Alembic
# output_encoding = utf8

# Database URL - async PostgreSQL (Neon)
# This is a template; actual URL comes from environment variable
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost:5432/lexcore

# Version table configuration
# version_table = alembic_version
# version_table_schema = alembic

# Version path separator
version_path_separator = os

# Output encoding used when revision files are written
# output_encoding = utf-8

[post_write_hooks]
# Hooks run after migration script generation

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
