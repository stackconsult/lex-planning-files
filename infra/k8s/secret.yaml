# Kubernetes Secret for sensitive configuration

apiVersion: v1
kind: Secret
metadata:
  name: lexcore-secrets
  namespace: lexcore-prod
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@neon-host/dbname"
  NEON_API_KEY: "placeholder-neon-api-key"
  OPENAI_API_KEY: "placeholder-openai-api-key"
