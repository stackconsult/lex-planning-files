name: Deploy — Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (git SHA or tag)'
        required: true
        type: string

jobs:
  approval-gate:
    name: Approval Gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Log approval
        run: |
          echo "Deployment approved by ${{ github.actor }} at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Deploying version: ${{ inputs.version }}"

  build-and-push:
    name: Build and Push Production Image
    runs-on: ubuntu-latest
    needs: approval-gate
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/lexcore-api:prod-${{ inputs.version }}
            ${{ steps.login-ecr.outputs.registry }}/lexcore-api:prod-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ENVIRONMENT=production

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/lexcore-worker:prod-${{ inputs.version }}
            ${{ steps.login-ecr.outputs.registry }}/lexcore-worker:prod-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ENVIRONMENT=production

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name lexcore-prod --region us-east-1
      
      - name: Backup current deployment
        run: |
          kubectl get deployment lexcore-api -n lexcore-prod -o yaml > /tmp/lexcore-api-backup-$(date +%Y%m%d%H%M%S).yaml
      
      - name: Canary deploy (25% traffic)
        run: |
          kubectl set image deployment/lexcore-api api=${{ steps.login-ecr.outputs.registry }}/lexcore-api:prod-${{ inputs.version }} -n lexcore-prod
          # Wait for new pods
          kubectl rollout status deployment/lexcore-api -n lexcore-prod --timeout=300s
      
      - name: Run smoke tests
        run: |
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            --namespace=lexcore-prod \
            -- curl -s http://lexcore-api/health/ready
      
      - name: Monitor for 5 minutes
        run: |
          echo "Monitoring deployment for 5 minutes..."
          sleep 300
          # Check pod status
          kubectl get pods -n lexcore-prod -l app=lexcore-api
          # Check for restart loops
          kubectl get events -n lexcore-prod --field-selector reason=BackOff --sort-by='.lastTimestamp' | tail -5
      
      - name: Check error rate
        run: |
          # Query Prometheus for error rate in last 5 minutes
          ERROR_RATE=$(curl -s "http://prometheus.monitoring:9090/api/v1/query?query=rate(http_requests_total{job=\"lexcore-api\",status=~\"5..\"}[5m])" | jq '.data.result[]?.value[1] // "0"')
          echo "5xx error rate: $ERROR_RATE"
          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "Error rate too high! Rolling back..."
            exit 1
          fi
      
      - name: Full rollout (100% traffic)
        if: success()
        run: |
          echo "Deployment successful. All traffic routed to new version."
      
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Rolling back..."
          kubectl rollout undo deployment/lexcore-api -n lexcore-prod
          kubectl rollout status deployment/lexcore-api -n lexcore-prod --timeout=300s
          echo "Rollback completed."

  post-deploy-smoke:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name lexcore-prod --region us-east-1
      
      - name: Run comprehensive smoke tests
        run: |
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            --namespace=lexcore-prod \
            -- sh -c '
              # Health check
              curl -sf http://lexcore-api/health/ready || exit 1
              curl -sf http://lexcore-api/health/live || exit 1
              
              # API endpoints
              curl -sf http://lexcore-api/v1/mcp/get_capabilities || exit 1
              
              # Tenant isolation check
              curl -sf -H "X-API-Key: test-key" http://lexcore-api/v1/lexcore/documents || exit 1
            '
      
      - name: Tag deployment as successful
        run: |
          echo "Deployment of version ${{ inputs.version }} to production completed successfully at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
