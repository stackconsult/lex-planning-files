name: Deploy — Development

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/lexcore-api:dev-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/lexcore-api:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ENVIRONMENT=dev
      
      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/lexcore-worker:dev-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/lexcore-worker:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ENVIRONMENT=dev

  deploy:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: development
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name lexcore-dev --region us-east-1
      
      - name: Update API deployment image
        run: |
          kubectl set image deployment/lexcore-api api=${{ steps.login-ecr.outputs.registry }}/lexcore-api:dev-${{ github.sha }} -n lexcore-dev
          kubectl rollout status deployment/lexcore-api -n lexcore-dev --timeout=300s
      
      - name: Update worker deployment image
        run: |
          kubectl set image deployment/lexcore-worker worker=${{ steps.login-ecr.outputs.registry }}/lexcore-worker:dev-${{ github.sha }} -n lexcore-dev
          kubectl rollout status deployment/lexcore-worker -n lexcore-dev --timeout=300s
      
      - name: Run smoke tests
        run: |
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            --namespace=lexcore-dev \
            -- curl -s http://lexcore-api/health/ready
